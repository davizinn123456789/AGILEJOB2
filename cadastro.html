<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - AgileJob</title>
</head>
<body>

<div class="caixa-cadastro">
    <h1 class="titulo">Crie sua Conta</h1>

    <form action="" method="POST">
        <input type="text" placeholder="Nome Completo" class="campo">
        <input type="email" placeholder="E-mail" class="campo">
        <input type="password" placeholder="Crie uma Senha" class="campo">
        <input type="password" placeholder="Confirme a Senha" class="campo">

        <input type="submit" value="Cadastrar" class="b-entrar">
    </form>

    <a href="loginagile.html" class="link-voltar">Já tem conta? Faça Login</a>
</div>

<style>
    body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
    }

    .caixa-cadastro {
        background-color: #000;
        width: 380px;
        padding: 40px;
        border: 6px solid #a90000;
        border-radius: 20px;
        text-align: center;
    }

    .titulo {
        color: #a90000;
        margin-bottom: 25px;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .campo {
        width: 100%;
        height: 40px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 2px solid #333;
        padding: 10px;
        font-size: 16px;
        background-color: #fff;
        box-sizing: border-box;
    }

    .b-entrar {
        width: 100%;
        height: 45px;
        background-color: white;
        color: black;
        border-radius: 10px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .b-entrar:hover {
        background-color: #a90000;
        color: white;
    }

    .link-voltar {
        display: block;
        margin-top: 20px;
        color: #a90000;
        font-size: 14px;
        text-decoration: none;
    }
</style>
</body>
</html>
