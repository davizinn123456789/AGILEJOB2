<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Candidatos - AgileJob</title>
</head>
<body>

    <h1 class="titulo">CANDIDATURAS</h1>
    
    <div class="painel-gestao">
        
        <div class="vaga-box">
            <div class="topo-vaga">
                <h3>Dev Backend Python</h3>
                <span class="contador">3 Candidatos</span>
            </div>
            
            <ul class="lista-candidatos">
                <li>
                    <strong>João Silva</strong> - Sênior
                    <a href="#" class="btn-ver">Ver Currículo</a>
                </li>
                <li>
                    <strong>Maria Souza</strong> - Pleno
                    <a href="#" class="btn-ver">Ver Currículo</a>
                </li>
                <li>
                    <strong>Pedro Alvares</strong> - Especialista
                    <a href="#" class="btn-ver">Ver Currículo</a>
                </li>
            </ul>
        </div>

        <div class="vaga-box">
            <div class="topo-vaga">
                <h3>Designer UI/UX</h3>
                <span class="contador">1 Candidato</span>
            </div>
            
            <ul class="lista-candidatos">
                <li>
                    <strong>Ana Clara</strong> - Pleno
                    <a href="#" class="btn-ver">Ver Currículo</a>
                </li>
            </ul>
        </div>

    </div>

    <a href="agilejob.html" class="link-home">Voltar ao Início</a>

<style>
    body {
        background-color: #000;
        color: #fff;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px;
    }

    .titulo {
        color: #a90000;
        font-size: 2.5rem;
        letter-spacing: 4px;
        margin-bottom: 40px;
    }

    .painel-gestao {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 100%;
        max-width: 700px;
    }

    .vaga-box {
        border: 4px solid #a90000;
        border-radius: 12px;
        padding: 20px;
        background-color: #0a0a0a;
    }

    .topo-vaga {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #a90000;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }

    .topo-vaga h3 {
        margin: 0;
        text-transform: uppercase;
    }

    .contador {
        background: #a90000;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: bold;
        border-radius: 4px;
    }

    .lista-candidatos {
        list-style: none;
        padding: 0;
    }

    .lista-candidatos li {
        padding: 10px 0;
        border-bottom: 1px solid #222;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 14px;
    }

    .btn-ver {
        color: #a90000;
        text-decoration: none;
        font-size: 11px;
        font-weight: bold;
        text-transform: uppercase;
        border: 1px solid #a90000;
        padding: 4px 8px;
        border-radius: 4px;
    }

    .btn-ver:hover {
        background: #a90000;
        color: #fff;
    }

    .link-home {
        margin-top: 40px;
        color: #888;
        text-decoration: none;
    }
</style>
</body>
</html>
