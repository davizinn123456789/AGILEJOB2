<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-agilejob</title>
</head>
<body>

<div class="caixa-login">
    <h1 class="titulo">Login</h1>

    <form action="" method="POST">
        
        <input type="text" placeholder="E-mail" class="campo">
        
        <input type="text" placeholder="Senha" class="campo">

        <input type="submit" value="Entrar" class="b-entrar">

    </form>

    <a href="agilejob.html" class="link-voltar">Voltar para o inicio</a>
</div>
<a href="redefinir.html" class="link-redefinir">Esqueceu sua senha?</a>

  <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .caixa-login {
            background-color: #000;
            width: 350px;
            padding: 40px;
            border: 6px solid #a90000;
            border-radius: 20px;
            text-align: center;
        }

        .titulo {
            color: #a90000;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .campo {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid black;
            padding: 10px;
            font-size: 16px;
        }

        .b-entrar {
            width: 100%;
            height: 45px;
            background-color: white;
            color: black;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            border: 2px solid black;
        }
        .link-voltar {
            display: block;
            margin-top: 20px;
            color: #a90000;
            font-size: 14px;
        }
        .link-redefinir {
            display: block;
            color: #888;
            font-size: 13px;
            text-decoration: none;
            transition: 0.3s;
            margin-left: 10px;
            margin-top: 350px;
            position: absolute;
        }
        .link-redefinir:hover {
            color: #fff;
        }
    </style>
</body>
</html>
