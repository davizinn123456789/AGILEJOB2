<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anunciar Vaga - AgileJob</title>
</head>
<body>

    <div class="cartao-vaga">
        <h2>Postar Nova Vaga</h2>
        <p>Preencha os detalhes da oportunidade abaixo.</p>

        <form action="#">
            <input type="text" placeholder="Título do Cargo (ex: Dev Frontend)" class="campo">
            <input type="text" placeholder="Nome da Empresa" class="campo">
            
            <select class="campo" style="height: 45px; background-color: #f9f9f9;">
                <option value="">Tipo de Contratação</option>
                <option value="clt">CLT</option>
                <option value="pj">PJ</option>
                <option value="estagio">Estágio</option>
            </select>

            <textarea placeholder="Descrição das responsabilidades e requisitos..." class="campo" style="height: 120px; padding: 10px; font-family: sans-serif;"></textarea>
            
            <button type="submit" class="btn-postar">Publicar Vaga</button>
        </form>

        <a href="agilejob.html" class="voltar">← Voltar ao Início</a>
    </div>

<style>
    body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: sans-serif;
    }

    .cartao-vaga {
        background-color: #000;
        width: 450px;
        padding: 30px;
        border-radius: 15px;
        border: 6px solid #a90000;
        margin: 20px;
    }

    h2 {
        color: #a90000;
        text-align: center;
        text-transform: uppercase;
    }

    p {
        color: #ffffff;
        text-align: center;
        margin-bottom: 25px;
    }

    .campo {
        width: 100%;
        padding: 12px;
        margin-bottom: 15px;
        border: 1px solid #333;
        border-radius: 8px;
        box-sizing: border-box;
        background-color: #f9f9f9;
        font-size: 14px;
    }

    .btn-postar {
        width: 100%;
        padding: 15px;
        background-color: #a90000;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        text-transform: uppercase;
    }

    .btn-postar:hover {
        background-color: #d10000;
    }

    .voltar {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: #a90000;
        text-decoration: none;
    }
</style>
</body>
</html>
