<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - AgileJob</title>
</head>
<body>

<div class="caixa-redefinir">
    <h1 class="titulo">Recuperar Senha</h1>
    <p class="instrucao">Digite seu e-mail cadastrado para receber as instruções de redefinição.</p>

    <form action="" method="POST">
        <input type="text" placeholder="Seu e-mail" class="campo">
        <input type="submit" value="Enviar Link" class="b-enviar">
    </form>

    <a href="loginagile.html" class="link-voltar">Voltar para o Login</a>
</div>

<style>
    body {
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
    }

    .caixa-redefinir {
        background-color: #000;
        width: 380px;
        padding: 40px;
        border: 6px solid #a90000;
        border-radius: 20px;
        text-align: center;
        box-sizing: border-box;
    }

    .titulo {
        color: #a90000;
        margin-bottom: 15px;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .instrucao {
        color: #ccc;
        font-size: 14px;
        margin-bottom: 25px;
        line-height: 1.4;
    }

    .campo {
        width: 100%;
        height: 45px;
        margin-bottom: 20px;
        border-radius: 10px;
        border: 2px solid #333;
        padding: 10px;
        font-size: 16px;
        background-color: #fff;
        box-sizing: border-box;
    }

    .b-enviar {
        width: 100%;
        height: 45px;
        background-color: white;
        color: black;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        font-weight: bold;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .b-enviar:hover {
        background-color: #a90000;
        color: white;
    }

    .link-voltar {
        display: block;
        margin-top: 25px;
        color: #a90000;
        font-size: 14px;
        text-decoration: none;
    }

    .link-voltar:hover {
        text-decoration: underline;
    }
</style>

</body>
</html>
